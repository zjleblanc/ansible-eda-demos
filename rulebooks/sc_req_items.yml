---
- name: Ingest Service Now Requested Items
  hosts: all

  sources:
    # will be replaced by Event Stream
    - name: Service Now Event Source
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5003

  rules:
    - name: Create Label
      condition: event.payload.aap_label is not defined
      action:
        run_job_template:
          name: AAP // Create Label
          organization: Autodotes
          post_events: true
          job_args:
            extra_vars:
              organization: "Autodotes"
              label: "{{ event.payload['number'] }}"
              payload: "{{ event.payload }}"

    - name: Provision VM
      condition: event.payload.cat_item == 'a1adfeaf87f46a1064a055383cbb35d9'
      action:
        run_workflow_template:
          name: AWS // Provisioning Workflow
          organization: Autodotes
          job_args:
            extra_vars:
              aws_ec2_names_list: "{{ event.payload['variables']['sn_vm_name'] }}"
              target_platform: "{{ event.payload['variables']['sn_target_platform'] }}"
              aws_region: "{{ event.payload['variables']['sn_aws_region'] }}"
              dnf_packages:
                - kernel
                - kernel-core
                - kernel-modules
                - kernel-modules-core

    - name: Decommission VM
      condition: event.payload.cat_item == '85c7c43f873c6a1064a055383cbb35dc'
      action:
        run_workflow_template:
          name: AWS // Decommission Workflow
          organization: Autodotes
          job_args:
            extra_vars:
              aws_ec2_names_list: "{{ event.payload['variables']['sn_vm_name'] }}"

    - name: Deploy and Configure VM - Ansible + Terraform
      condition: event.payload.cat_item == '3dfcbfc687633e106a094046cebb3507'
      action:
        run_workflow_template:
          name: Terraform // HCP // Azure Deploy and Configure Workflow
          organization: Autodotes
          job_args:
            extra_vars:
              az_ssh_pubkey: "{{ event.payload['variables']['sn_ssh_public_key'] }}"
              az_web_vm_size: "{{ event.payload['variables']['sn_azure_vm_size'] }}"
              sn_req_item: "{{ event.payload['number'] }}"
              sn_created_by: "{{ event.payload['sys_created_by'] }}"
              create_sc_task_data:
                request_item: "{{ event.payload['number'] }}"
                assignment_group: "Ansible West Tigers"

    - name: Catch 'em All
      condition: 1 == 1
      action:
        debug:
          msg: "{{ event.payload }}"